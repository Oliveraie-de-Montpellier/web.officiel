<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70">
  <!-- Fond vert HVE -->
  <rect width="70" height="70" rx="8" fill="#1B6B3A"/>
  <!-- Arbre stylisé (3 couches triangulaires + tronc) -->
  <!-- Tronc -->
  <rect x="32" y="43" width="6" height="10" fill="white"/>
  <!-- Couche basse (large) -->
  <polygon points="16,43 54,43 35,31" fill="white"/>
  <!-- Couche milieu -->
  <polygon points="20,35 50,35 35,22" fill="white"/>
  <!-- Couche haute (petite) -->
  <polygon points="25,27 45,27 35,14" fill="white"/>
  <!-- Texte HVE -->
  <text x="35" y="63" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="white" letter-spacing="2">HVE</text>
</svg>
